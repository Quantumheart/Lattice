name: lattice
description: A Flutter Matrix client with multiple adaptive layouts.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  animations: ^2.0.11
  cached_network_image: ^3.3.1
  canonical_json: ^1.1.2
  clock: ^1.1.1
  desktop_drop: ^0.7.0
  desktop_notifications: ^0.6.3
  dynamic_color: ^1.7.0
  emoji_picker_flutter: ^4.3.0
  file_picker: ^8.1.3
  flutter:
    sdk: flutter
  flutter_local_notifications: ^18.0.1
  flutter_secure_storage: ^10.0.0
  flutter_vodozemac: ^0.5.0
  go_router: ^14.8.1
  highlight: ^0.7.0
  html: ^0.15.4
  http: ^1.2.0
  image_picker: ^1.1.2
  matrix: ^6.1.1
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.2
  record: ^6.2.0
  scrollable_positioned_list: ^0.3.8
  shared_preferences: ^2.3.4
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.7+1
  url_launcher: ^6.3.2
  vodozemac: ^0.5.0

dev_dependencies:
  build_runner: ^2.4.0
  fake_async: ^1.3.1
  flutter_local_notifications_platform_interface: any
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.0
  timezone: any
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
