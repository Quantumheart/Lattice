name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Verify tag is on master
        if: github.event_name == 'push'
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "::error::Tag must point to a commit on master"
            exit 1
          fi
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test

  build-linux:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libmpv-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Strip debug symbols
        run: strip build/linux/x64/release/bundle/lattice
      - name: Archive build
        run: tar -czf lattice-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - name: Generate checksum
        run: sha256sum lattice-linux-x64.tar.gz > lattice-linux-x64.tar.gz.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-release
          path: |
            lattice-linux-x64.tar.gz
            lattice-linux-x64.tar.gz.sha256

  build-windows:
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Strip debug symbols
        shell: bash
        run: strip build/windows/x64/runner/Release/lattice.exe
      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          iscc /DAppVersion=$version windows\packaging\inno_setup.iss
      - name: Generate checksum
        run: Get-FileHash build\windows\installer\lattice-windows-x64-setup.exe -Algorithm SHA256 | Format-List > build\windows\installer\lattice-windows-x64-setup.exe.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-release
          path: |
            build/windows/installer/lattice-windows-x64-setup.exe
            build/windows/installer/lattice-windows-x64-setup.exe.sha256

  publish-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: linux-release
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: |
            lattice-linux-x64.tar.gz
            lattice-linux-x64.tar.gz.sha256
            lattice-windows-x64-setup.exe
            lattice-windows-x64-setup.exe.sha256
          generate_release_notes: true
