name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Verify tag is on master
        if: github.event_name == 'push'
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "::error::Tag must point to a commit on master"
            exit 1
          fi
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test

  build-linux:
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libmpv-dev
      - run: flutter pub get
      - run: flutter build linux --release --dart-define=GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }}
      - name: Strip debug symbols
        run: strip build/linux/x64/release/bundle/kohera
      - name: Archive build
        run: tar -czf kohera-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - name: Generate checksum
        run: sha256sum kohera-linux-x64.tar.gz > kohera-linux-x64.tar.gz.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-release
          path: |
            kohera-linux-x64.tar.gz
            kohera-linux-x64.tar.gz.sha256

  build-windows:
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release --split-debug-info=build/windows/debug-info --obfuscate --dart-define=GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }}
      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          iscc /DAppVersion=$version windows\packaging\inno_setup.iss
      - name: Generate checksum
        run: Get-FileHash build\windows\installer\kohera-windows-x64-setup.exe -Algorithm SHA256 | Format-List > build\windows\installer\kohera-windows-x64-setup.exe.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-release
          path: |
            build/windows/installer/kohera-windows-x64-setup.exe
            build/windows/installer/kohera-windows-x64-setup.exe.sha256

  build-macos:
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release --dart-define=GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }}
      - name: Archive build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../kohera-macos-universal.zip kohera.app
      - name: Generate checksum
        run: shasum -a 256 kohera-macos-universal.zip > kohera-macos-universal.zip.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-release
          path: |
            kohera-macos-universal.zip
            kohera-macos-universal.zip.sha256

  build-ios:
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true
      - name: Install distribution certificate
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$IOS_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
      - name: Install provisioning profiles
        env:
          IOS_RUNNER_PROVISION_PROFILE: ${{ secrets.IOS_RUNNER_PROVISION_PROFILE }}
          IOS_NSE_PROVISION_PROFILE: ${{ secrets.IOS_NSE_PROVISION_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$IOS_RUNNER_PROVISION_PROFILE" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/runner.mobileprovision
          echo -n "$IOS_NSE_PROVISION_PROFILE" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/nse.mobileprovision
      - run: flutter pub get
      - run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --build-number=${{ github.run_number }} --dart-define=GIPHY_API_KEY=${{ secrets.GIPHY_API_KEY }}
      - name: Upload to TestFlight
        env:
          APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          echo -n "$APPSTORE_CONNECT_API_KEY" | base64 --decode -o "$API_KEY_PATH"
          xcrun altool --upload-app \
            -f build/ios/ipa/kohera.ipa \
            -t ios \
            --apiKey "$APPSTORE_CONNECT_KEY_ID" \
            --apiIssuer "$APPSTORE_CONNECT_ISSUER_ID"
      - name: Generate checksum
        run: shasum -a 256 build/ios/ipa/kohera.ipa > kohera-ios-arm64.ipa.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-release
          path: |
            build/ios/ipa/kohera.ipa
            kohera-ios-arm64.ipa.sha256
      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  publish-release:
    needs: [build-linux, build-windows, build-macos, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: linux-release
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-release
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: macos-release
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ios-release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: |
            kohera-linux-x64.tar.gz
            kohera-linux-x64.tar.gz.sha256
            kohera-windows-x64-setup.exe
            kohera-windows-x64-setup.exe.sha256
            kohera-macos-universal.zip
            kohera-macos-universal.zip.sha256
            kohera.ipa
            kohera-ios-arm64.ipa.sha256
          generate_release_notes: true
